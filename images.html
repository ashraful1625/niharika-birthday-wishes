<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Photo Gallery 📸</title>
</head>
<body class="images-page">
    <nav class="navbar">
        <div class="nav-container">
            <h2 class="nav-title">📸 Photo Gallery</h2>
            <a href="dashboard.html" class="nav-link">← Back</a>
        </div>
    </nav>

    <div class="gallery-container">
        <h1>Our Beautiful Memories Together 📸</h1>
        
        <div class="gallery-grid">
            <div class="gallery-item">
                <img src="https://via.placeholder.com/300?text=Memory+1" alt="Memory 1">
                <div class="gallery-caption">Summer Vibes 2024</div>
            </div>
            <div class="gallery-item">
                <img src="https://via.placeholder.com/300?text=Memory+2" alt="Memory 2">
                <div class="gallery-caption">Birthday Lunch</div>
            </div>
            <div class="gallery-item">
                <img src="https://via.placeholder.com/300?text=Memory+3" alt="Memory 3">
                <div class="gallery-caption">Adventure Time</div>
            </div>
            <div class="gallery-item">
                <img src="https://via.placeholder.com/300?text=Memory+4" alt="Memory 4">
                <div class="gallery-caption">Coffee Dates</div>
            </div>
            <div class="gallery-item">
                <img src="https://via.placeholder.com/300?text=Memory+5" alt="Memory 5">
                <div class="gallery-caption">Festival Fun</div>
            </div>
            <div class="gallery-item">
                <img src="https://via.placeholder.com/300?text=Memory+6" alt="Memory 6">
                <div class="gallery-caption">Movie Night</div>
            </div>
            <div class="gallery-item">
                <img src="https://raw.githubusercontent.com/ashraful1625/niharika-birthday-wishes/refs/heads/main/memory7.jpg">
                <div class="gallery-caption">Travel Diaries</div>
            </div>
            <div class="gallery-item">
                <img src="https://via.placeholder.com/300?text=Memory+8" alt="Memory 8">
                <div class="gallery-caption">Selfie Time</div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
