<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>3D Birthday Cake - Cut & Blow the Candle | For My Love</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Poppins', 'Segoe UI', 'Arial', sans-serif;
        }
        
        /* UI Overlays */
        .message-overlay {
            position: absolute;
            bottom: 25px;
            left: 0;
            right: 0;
            text-align: center;
            pointer-events: none;
            z-index: 20;
            text-shadow: 0 0 20px rgba(0,0,0,0.6);
            font-weight: 600;
            color: #fff3e0;
            background: linear-gradient(90deg, transparent, rgba(0,0,0,0.5), transparent);
            padding: 12px;
            backdrop-filter: blur(5px);
            border-radius: 40px;
            width: fit-content;
            margin: 0 auto;
            font-size: 1.2rem;
            letter-spacing: 1px;
        }
        
        .message-overlay h1 {
            margin: 0;
            font-size: 1.8rem;
            font-family: 'Dancing Script', cursive;
            letter-spacing: 2px;
        }
        
        .cut-info {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(8px);
            padding: 12px 20px;
            border-radius: 40px;
            color: #ffd966;
            font-weight: bold;
            font-size: 1.2rem;
            font-family: monospace;
            letter-spacing: 1px;
            pointer-events: none;
            z-index: 20;
            border-left: 3px solid #ffb347;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        
        .cut-info span {
            color: #ffaa66;
            font-size: 1.6rem;
            font-weight: 800;
        }
        
        .instruction {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(0,0,0,0.6);
            padding: 8px 16px;
            border-radius: 30px;
            color: #ffdd99;
            font-size: 0.85rem;
            pointer-events: none;
            font-family: monospace;
            backdrop-filter: blur(4px);
            z-index: 20;
        }
        
        .blow-btn {
            position: absolute;
            bottom: 30px;
            right: 30px;
            background: linear-gradient(135deg, #ff9a3c, #ff5e3a);
            border: none;
            color: white;
            font-weight: bold;
            padding: 12px 24px;
            border-radius: 50px;
            font-size: 1.2rem;
            cursor: pointer;
            z-index: 30;
            font-family: 'Poppins', sans-serif;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            transition: transform 0.2s, box-shadow 0.2s;
            letter-spacing: 1px;
        }
        
        .blow-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(0,0,0,0.4);
            background: linear-gradient(135deg, #ffb347, #ff6a3a);
        }
        
        .blow-btn:active {
            transform: scale(0.98);
        }
        
        @keyframes floatGlow {
            0% { transform: translateY(0) scale(1); opacity: 0.8; }
            100% { transform: translateY(-100px) scale(0); opacity: 0; }
        }
        
        .sparkle {
            position: absolute;
            width: 6px;
            height: 6px;
            background: radial-gradient(circle, #ffcc44, #ff8844);
            border-radius: 50%;
            pointer-events: none;
            z-index: 25;
            animation: floatGlow 1s ease-out forwards;
        }
        
        .smoke-particle {
            position: absolute;
            width: 20px;
            height: 20px;
            background: radial-gradient(circle, rgba(200,200,200,0.7), rgba(150,150,150,0));
            border-radius: 50%;
            pointer-events: none;
            z-index: 25;
            animation: riseSmoke 2s ease-out forwards;
        }
        
        @keyframes riseSmoke {
            0% { transform: translateY(0) scale(0.5); opacity: 0.6; }
            100% { transform: translateY(-150px) scale(2); opacity: 0; }
        }
        
        @media (max-width: 600px) {
            .message-overlay h1 { font-size: 1.2rem; }
            .cut-info { font-size: 0.9rem; top: 10px; right: 10px; padding: 6px 12px; }
            .blow-btn { padding: 8px 16px; font-size: 1rem; bottom: 20px; right: 20px; }
        }
        
        .controls-note {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(0,0,0,0.4);
            font-size: 10px;
            padding: 4px 8px;
            border-radius: 20px;
            color: #ccc;
            pointer-events: none;
            font-family: monospace;
            bottom: 70px;
        }
    </style>
</head>
<body>
    <div class="message-overlay">
        <h1>🎂 Happy Birthday, My Love! 🕯️</h1>
        <p>Click the cake to cut a slice • Click "Blow Candle" to make a wish!</p>
    </div>
    <div class="cut-info">
        🍰 Slices Cut: <span id="sliceCount">0</span>
    </div>
    <div class="instruction">
        ✨ Click/Tap on Cake → Cut a delicious slice! ✨
    </div>
    <button id="blowCandleBtn" class="blow-btn">💨 Blow Candle 🕯️</button>
    <div class="controls-note">
        🖱️ Drag to rotate • Right-click to pan
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

        // --- Setup Scene, Cameras, Renderers ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x111a2e);
        scene.fog = new THREE.FogExp2(0x111a2e, 0.012);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);
        
        const labelRenderer = new CSS2DRenderer();
        labelRenderer.setSize(window.innerWidth, window.innerHeight);
        labelRenderer.domElement.style.position = 'absolute';
        labelRenderer.domElement.style.top = '0px';
        labelRenderer.domElement.style.left = '0px';
        labelRenderer.domElement.style.pointerEvents = 'none';
        document.body.appendChild(labelRenderer.domElement);
        
        // --- Camera ---
        const camera = new THREE.PerspectiveCamera(42, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(5, 3.8, 6.5);
        camera.lookAt(0, 1.5, 0);
        
        // --- Controls ---
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.06;
        controls.rotateSpeed = 1.2;
        controls.zoomSpeed = 1.0;
        controls.panSpeed = 0.8;
        controls.target.set(0, 1.6, 0);
        
        // --- Lighting ---
        const ambientLight = new THREE.AmbientLight(0x404060, 0.65);
        scene.add(ambientLight);
        
        const mainLight = new THREE.DirectionalLight(0xfff5e0, 1.3);
        mainLight.position.set(4, 7, 3);
        mainLight.castShadow = true;
        mainLight.receiveShadow = true;
        mainLight.shadow.mapSize.width = 1024;
        mainLight.shadow.mapSize.height = 1024;
        mainLight.shadow.camera.near = 0.5;
        mainLight.shadow.camera.far = 12;
        mainLight.shadow.camera.left = -5;
        mainLight.shadow.camera.right = 5;
        mainLight.shadow.camera.top = 5;
        mainLight.shadow.camera.bottom = -5;
        scene.add(mainLight);
        
        const fillLight = new THREE.PointLight(0xd4a373, 0.55);
        fillLight.position.set(0, -0.5, 0);
        scene.add(fillLight);
        
        const rimLight = new THREE.PointLight(0xffaa77, 0.65);
        rimLight.position.set(-2.5, 2.5, -3);
        scene.add(rimLight);
        
        const frontFill = new THREE.PointLight(0xffcc99, 0.45);
        frontFill.position.set(1.2, 2, 2.8);
        scene.add(frontFill);
        
        // Candle light (dynamic)
        const candleLight = new THREE.PointLight(0xff8844, 1.0, 9);
        candleLight.castShadow = true;
        candleLight.shadow.mapSize.width = 512;
        candleLight.shadow.mapSize.height = 512;
        scene.add(candleLight);
        
        // --- Table Setup ---
        const tableMat = new THREE.MeshStandardMaterial({ color: 0xc7a47b, roughness: 0.7, metalness: 0.1 });
        const tableTop = new THREE.Mesh(new THREE.CylinderGeometry(2.8, 2.8, 0.2, 32), tableMat);
        tableTop.position.y = -0.55;
        tableTop.castShadow = true;
        tableTop.receiveShadow = true;
        scene.add(tableTop);
        
        const tableLegMat = new THREE.MeshStandardMaterial({ color: 0x9b7a54, roughness: 0.8 });
        for (let i = 0; i < 4; i++) {
            const angle = (i / 4) * Math.PI * 2;
            const x = Math.cos(angle) * 2.1;
            const z = Math.sin(angle) * 2.1;
            const leg = new THREE.Mesh(new THREE.CylinderGeometry(0.18, 0.22, 0.6, 8), tableLegMat);
            leg.position.set(x, -0.9, z);
            leg.castShadow = true;
            scene.add(leg);
        }
        
        // Ground plane shadow catcher
        const groundPlane = new THREE.Mesh(
            new THREE.PlaneGeometry(10, 10),
            new THREE.ShadowMaterial({ opacity: 0.35, color: 0x000000, transparent: true, side: THREE.DoubleSide })
        );
        groundPlane.rotation.x = -Math.PI / 2;
        groundPlane.position.y = -1.05;
        groundPlane.receiveShadow = true;
        scene.add(groundPlane);
        
        // --- Create the Cake Group ---
        const cakeGroup = new THREE.Group();
        scene.add(cakeGroup);
        
        // Cake dimensions
        const bottomRadius = 1.28;
        const bottomHeight = 0.48;
        const topRadius = 1.0;
        const topHeight = 0.42;
        const icingHeight = 0.13;
        
        const cakeMatBody = new THREE.MeshStandardMaterial({ color: 0xe8b56e, roughness: 0.28, metalness: 0.08, emissive: 0x2a1a0a, emissiveIntensity: 0.04 });
        const cakeTopMat = new THREE.MeshStandardMaterial({ color: 0xd99e4a, roughness: 0.35 });
        const icingMat = new THREE.MeshStandardMaterial({ color: 0xfff2e6, roughness: 0.2, emissive: 0xffddbb, emissiveIntensity: 0.05 });
        const creamMat = new THREE.MeshStandardMaterial({ color: 0xffe5cc, roughness: 0.45 });
        
        const bottomTier = new THREE.Mesh(new THREE.CylinderGeometry(bottomRadius, bottomRadius, bottomHeight, 64), cakeMatBody);
        bottomTier.castShadow = true;
        bottomTier.receiveShadow = true;
        bottomTier.position.y = bottomHeight / 2;
        cakeGroup.add(bottomTier);
        
        const creamLayer = new THREE.Mesh(new THREE.CylinderGeometry(bottomRadius + 0.04, bottomRadius + 0.04, 0.09, 64), creamMat);
        creamLayer.position.y = bottomHeight + 0.02;
        creamLayer.castShadow = true;
        cakeGroup.add(creamLayer);
        
        const topTier = new THREE.Mesh(new THREE.CylinderGeometry(topRadius, topRadius, topHeight, 64), cakeMatBody);
        topTier.castShadow = true;
        topTier.receiveShadow = true;
        topTier.position.y = bottomHeight + 0.09 + topHeight / 2;
        cakeGroup.add(topTier);
        
        const icingLayer = new THREE.Mesh(new THREE.CylinderGeometry(topRadius + 0.06, topRadius + 0.09, icingHeight, 64), icingMat);
        icingLayer.position.y = bottomHeight + 0.09 + topHeight + icingHeight / 2;
        icingLayer.castShadow = true;
        cakeGroup.add(icingLayer);
        
        // Sprinkles
        const sprinkleColors = [0xffaa66, 0xff6f61, 0xd4af37, 0xcd5c5c, 0x9b59b6, 0x6a9eff];
        for (let i = 0; i < 180; i++) {
            const angle = Math.random() * Math.PI * 2;
            const rad = topRadius * (0.45 + Math.random() * 0.65);
            const x = Math.cos(angle) * rad;
            const z = Math.sin(angle) * rad;
            const sprinkle = new THREE.Mesh(new THREE.CylinderGeometry(0.045, 0.045, 0.07, 8), new THREE.MeshStandardMaterial({ color: sprinkleColors[Math.floor(Math.random() * sprinkleColors.length)], emissive: 0x331100 }));
            sprinkle.position.set(x, bottomHeight + 0.09 + topHeight + icingHeight - 0.025, z);
            sprinkle.castShadow = true;
            sprinkle.rotation.z = Math.random() * Math.PI;
            cakeGroup.add(sprinkle);
        }
        
        // --- Candle and Flame System ---
        const candleGroup = new THREE.Group();
        const candleMatC = new THREE.MeshStandardMaterial({ color: 0xfff8ec, emissive: 0xffaa77, emissiveIntensity: 0.12 });
        const candleBody = new THREE.Mesh(new THREE.CylinderGeometry(0.13, 0.14, 0.68, 32), candleMatC);
        candleBody.castShadow = true;
        candleGroup.add(candleBody);
        
        const wick = new THREE.Mesh(new THREE.CylinderGeometry(0.025, 0.025, 0.09, 6), new THREE.MeshStandardMaterial({ color: 0x331100 }));
        wick.position.y = 0.35;
        candleGroup.add(wick);
        
        // Flame meshes
        const flameMat = new THREE.MeshStandardMaterial({ color: 0xff6600, emissive: 0xff4400, emissiveIntensity: 0.95 });
        const flame = new THREE.Mesh(new THREE.ConeGeometry(0.095, 0.22, 24), flameMat);
        flame.position.y = 0.41;
        candleGroup.add(flame);
        
        const innerFlame = new THREE.Mesh(new THREE.SphereGeometry(0.05, 12, 12), new THREE.MeshStandardMaterial({ color: 0xffaa55, emissive: 0xff6600, emissiveIntensity: 1.2 }));
        innerFlame.position.y = 0.44;
        candleGroup.add(innerFlame);
        
        candleGroup.position.set(0, bottomHeight + 0.09 + topHeight + icingHeight - 0.04, 0);
        cakeGroup.add(candleGroup);
        
        // Decorative rosettes around candle
        const rosetteMatDec = new THREE.MeshStandardMaterial({ color: 0xffb3b3 });
        for (let i = 0; i < 8; i++) {
            const angle = (i / 8) * Math.PI * 2;
            const rad = 0.32;
            const rosette = new THREE.Mesh(new THREE.SphereGeometry(0.085, 16, 16), rosetteMatDec);
            rosette.position.set(Math.cos(angle) * rad, bottomHeight + 0.09 + topHeight + icingHeight - 0.02, Math.sin(angle) * rad);
            cakeGroup.add(rosette);
        }
        
        // --- Candle Blow Logic ---
        let isCandleLit = true;
        let blowAnimationActive = false;
        const blowBtn = document.getElementById('blowCandleBtn');
        
        function addSmokeBurst() {
            for (let i = 0; i < 30; i++) {
                const smoke = document.createElement('div');
                smoke.classList.add('smoke-particle');
                const xOff = (Math.random() - 0.5) * 80;
                const yOff = (Math.random() * 40);
                smoke.style.left = `calc(50% + ${xOff}px)`;
                smoke.style.top = `calc(50% + ${yOff}px - 100px)`;
                document.body.appendChild(smoke);
                setTimeout(() => smoke.remove(), 2000);
            }
        }
        
        function blowOutCandle() {
            if (!isCandleLit) return;
            isCandleLit = false;
            blowAnimationActive = true;
            
            // Animate flame shrinking
            const startScale = 1;
            const endScale = 0;
            const duration = 400;
            const startTime = performance.now();
            
            function animateBlow(now) {
                const elapsed = now - startTime;
                const t = Math.min(1, elapsed / duration);
                const scale = 1 - t;
                flame.scale.set(scale, scale, scale);
                innerFlame.scale.set(scale, scale, scale);
                flame.material.emissiveIntensity = 0.95 * (1 - t);
                innerFlame.material.emissiveIntensity = 1.2 * (1 - t);
                candleLight.intensity = 1.0 * (1 - t);
                if (t < 1) {
                    requestAnimationFrame(animateBlow);
                } else {
                    flame.visible = false;
                    innerFlame.visible = false;
                    candleLight.intensity = 0;
                    blowAnimationActive = false;
                    // Show wish message
                    const wishMsg = document.createElement('div');
                    wishMsg.textContent = "🎈 Make a Wish, My Love! 🎈✨";
                    wishMsg.style.position = 'absolute';
                    wishMsg.style.top = '35%';
                    wishMsg.style.left = '50%';
                    wishMsg.style.transform = 'translateX(-50%)';
                    wishMsg.style.background = 'rgba(0,0,0,0.8)';
                    wishMsg.style.color = '#ffdd99';
                    wishMsg.style.padding = '16px 28px';
                    wishMsg.style.borderRadius = '60px';
                    wishMsg.style.fontSize = '1.6rem';
                    wishMsg.style.fontFamily = 'cursive';
                    wishMsg.style.fontWeight = 'bold';
                    wishMsg.style.zIndex = 100;
                    wishMsg.style.backdropFilter = 'blur(8px)';
                    wishMsg.style.whiteSpace = 'nowrap';
                    document.body.appendChild(wishMsg);
                    setTimeout(() => wishMsg.remove(), 4000);
                }
            }
            requestAnimationFrame(animateBlow);
            addSmokeBurst();
            // also add sparkle celebration
            for (let i = 0; i < 40; i++) {
                setTimeout(() => {
                    const spark = document.createElement('div');
                    spark.classList.add('sparkle');
                    spark.style.left = `${Math.random() * window.innerWidth}px`;
                    spark.style.top = `${Math.random() * window.innerHeight}px`;
                    document.body.appendChild(spark);
                    setTimeout(() => spark.remove(), 1000);
                }, i * 30);
            }
        }
        
        blowBtn.addEventListener('click', () => {
            if (isCandleLit) {
                blowOutCandle();
            } else {
                // Already blown out, show sweet message
                const alreadyMsg = document.createElement('div');
                alreadyMsg.textContent = "💖 Your wish is already on its way! 💖";
                alreadyMsg.style.position = 'absolute';
                alreadyMsg.style.bottom = '40%';
                alreadyMsg.style.left = '50%';
                alreadyMsg.style.transform = 'translateX(-50%)';
                alreadyMsg.style.background = '#ffddccdd';
                alreadyMsg.style.padding = '10px 20px';
                alreadyMsg.style.borderRadius = '40px';
                alreadyMsg.style.color = '#a53f2b';
                alreadyMsg.style.fontWeight = 'bold';
                alreadyMsg.style.zIndex = 100;
                document.body.appendChild(alreadyMsg);
                setTimeout(() => alreadyMsg.remove(), 2000);
            }
        });
        
        // --- CUTABLE SLICE MECHANICS (Flying Slices)---
        let sliceCount = 0;
        const maxSlices = 12;
        const sliceCounterElem = document.getElementById('sliceCount');
        
        function createFlyingSlice(angleRad) {
            const sliceGroup = new THREE.Group();
            // Wedge-like visual using a low-radius cylinder and scaling to look like a slice
            const wedgeGeo = new THREE.CylinderGeometry(0.65, 0.72, 0.28, 4);
            const slicePiece = new THREE.Mesh(wedgeGeo, new THREE.MeshStandardMaterial({ color: 0xe8b56e, roughness: 0.3 }));
            slicePiece.castShadow = true;
            slicePiece.rotation.y = angleRad;
            sliceGroup.add(slicePiece);
            
            const icingWedge = new THREE.Mesh(new THREE.CylinderGeometry(0.68, 0.7, 0.09, 4), new THREE.MeshStandardMaterial({ color: 0xfff0e0 }));
            icingWedge.position.y = 0.16;
            icingWedge.castShadow = true;
            sliceGroup.add(icingWedge);
            
            const radiusPos = 1.15;
            const x = Math.cos(angleRad) * radiusPos;
            const z = Math.sin(angleRad) * radiusPos;
            sliceGroup.position.set(x, 0.42, z);
            cakeGroup.add(sliceGroup);
            
            const startPos = sliceGroup.position.clone();
            const targetPos = startPos.clone().add(new THREE.Vector3(Math.cos(angleRad) * 1.4, 1.1 + Math.random() * 0.9, Math.sin(angleRad) * 1.4));
            let progress = 0;
            const duration = 0.55;
            const startTime = performance.now() / 1000;
            
            function animateSlice() {
                const now = performance.now() / 1000;
                const elapsed = now - startTime;
                const t = Math.min(1, elapsed / duration);
                const ease = 1 - Math.pow(1 - t, 2);
                sliceGroup.position.lerpVectors(startPos, targetPos, ease);
                sliceGroup.rotation.x = t * Math.PI * 0.7;
                sliceGroup.rotation.z = t * Math.PI * 0.5;
                if (t >= 1) {
                    cakeGroup.remove(sliceGroup);
                    sliceGroup.children.forEach(child => {
                        if (child.isMesh) child.geometry.dispose();
                    });
                } else {
                    requestAnimationFrame(animateSlice);
                }
            }
            requestAnimationFrame(animateSlice);
        }
        
        function addSparklesAt(x, z) {
            for (let i = 0; i < 28; i++) {
                const spark = document.createElement('div');
                spark.classList.add('sparkle');
                spark.style.left = `${Math.random() * window.innerWidth}px`;
                spark.style.top = `${Math.random() * window.innerHeight}px`;
                document.body.appendChild(spark);
                setTimeout(() => spark.remove(), 1000);
            }
        }
        
        // Raycaster for clicking cake
        const raycaster = new THREE.Raycaster();
        const clickableObjects = [];
        cakeGroup.children.forEach(child => {
            if (child.isMesh && child !== candleGroup && !child.userData.isFloating) {
                clickableObjects.push(child);
            }
        });
        clickableObjects.push(bottomTier, topTier, icingLayer, creamLayer);
        
        function onCakeClick(event) {
            if (sliceCount >= maxSlices) {
                const fullMsg = document.createElement('div');
                fullMsg.textContent = "🍰 All slices shared! Happy Birthday! 🎂";
                fullMsg.style.position = 'absolute';
                fullMsg.style.bottom = '45%';
                fullMsg.style.left = '50%';
                fullMsg.style.transform = 'translateX(-50%)';
                fullMsg.style.background = '#f9e2c7';
                fullMsg.style.padding = '12px 24px';
                fullMsg.style.borderRadius = '40px';
                fullMsg.style.fontWeight = 'bold';
                fullMsg.style.color = '#b45f2b';
                fullMsg.style.zIndex = 100;
                document.body.appendChild(fullMsg);
                setTimeout(() => fullMsg.remove(), 2000);
                return;
            }
            
            const mouse = new THREE.Vector2();
            mouse.x = (event.clientX / renderer.domElement.clientWidth) * 2 - 1;
            mouse.y = -(event.clientY / renderer.domElement.clientHeight) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(clickableObjects, true);
            if (intersects.length > 0) {
                const hitPoint = intersects[0].point;
                let angle = Math.atan2(hitPoint.z, hitPoint.x);
                createFlyingSlice(angle);
                sliceCount++;
                sliceCounterElem.textContent = sliceCount;
                addSparklesAt(hitPoint.x, hitPoint.z);
                
                // cake wiggle
                cakeGroup.position.y = 0.025;
                setTimeout(() => { cakeGroup.position.y = 0; }, 120);
                
                // if candle lit, flicker excitement
                if (isCandleLit) {
                    candleLight.intensity = 1.5;
                    setTimeout(() => { if(isCandleLit) candleLight.intensity = 1.0; }, 200);
                }
                
                // Special message after some cuts
                if (sliceCount === 5 && isCandleLit) {
                    const cutMsg = document.createElement('div');
                    cutMsg.textContent = "💕 Each slice is sweeter with you! 💕";
                    cutMsg.style.position = 'absolute';
                    cutMsg.style.top = '25%';
                    cutMsg.style.left = '50%';
                    cutMsg.style.transform = 'translateX(-50%)';
                    cutMsg.style.background = 'rgba(0,0,0,0.6)';
                    cutMsg.style.padding = '8px 18px';
                    cutMsg.style.borderRadius = '40px';
                    cutMsg.style.color = '#ffdd99';
                    cutMsg.style.zIndex = 100;
                    document.body.appendChild(cutMsg);
                    setTimeout(() => cutMsg.remove(), 2500);
                }
            }
        }
        
        window.addEventListener('click', onCakeClick, false);
        
        // --- Animated Background Floating Hearts / Stars ---
        const starField = new THREE.Points(
            new THREE.BufferGeometry(),
            new THREE.PointsMaterial({ color: 0xffccaa, size: 0.045 })
        );
        const starCount = 600;
        const starPositions = new Float32Array(starCount * 3);
        for (let i = 0; i < starCount; i++) {
            starPositions[i*3] = (Math.random() - 0.5) * 45;
            starPositions[i*3+1] = (Math.random() - 0.5) * 12 + 1.5;
            starPositions[i*3+2] = (Math.random() - 0.5) * 28 - 12;
        }
        starField.geometry.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
        scene.add(starField);
        
        // CSS2D birthday label
        const labelDiv = document.createElement('div');
        labelDiv.textContent = '❤️ My Dearest ❤️';
        labelDiv.style.color = '#ffe0b5';
        labelDiv.style.fontSize = '18px';
        labelDiv.style.fontWeight = 'bold';
        labelDiv.style.textShadow = '1px 1px 0 #aa5533';
        labelDiv.style.background = 'rgba(0,0,0,0.4)';
        labelDiv.style.padding = '5px 14px';
        labelDiv.style.borderRadius = '40px';
        labelDiv.style.fontFamily = 'cursive';
        const labelObj = new CSS2DObject(labelDiv);
        labelObj.position.set(0, 2.65, 0);
        cakeGroup.add(labelObj);
        
        // --- Animation Loop & Flame Flicker (if lit)---
        let timeAnim = 0;
        
        function animate() {
            requestAnimationFrame(animate);
            timeAnim += 0.022;
            
            if (isCandleLit && !blowAnimationActive) {
                const flicker = 0.75 + Math.sin(timeAnim * 28) * 0.18;
                flame.scale.set(1, flicker, 1);
                innerFlame.scale.set(1, 0.85 + Math.sin(timeAnim * 35) * 0.2, 1);
                flame.material.emissiveIntensity = 0.85 + Math.sin(timeAnim * 30) * 0.35;
                innerFlame.material.emissiveIntensity = 1.1 + Math.sin(timeAnim * 38) * 0.45;
                candleLight.intensity = 0.9 + Math.sin(timeAnim * 20) * 0.28;
            } else if (!isCandleLit && !blowAnimationActive) {
                flame.visible = false;
                innerFlame.visible = false;
                candleLight.intensity = 0;
            }
            
            // Gentle floating stars
            starField.rotation.y += 0.0015;
            starField.rotation.x = Math.sin(timeAnim * 0.12) * 0.08;
            
            controls.update();
            renderer.render(scene, camera);
            labelRenderer.render(scene, camera);
        }
        
        animate();
        
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            labelRenderer.setSize(window.innerWidth, window.innerHeight);
        });
        
        console.log("🎂 Happy Birthday! Cut cake & blow the candle!");
    </script>
</body>
</html>
